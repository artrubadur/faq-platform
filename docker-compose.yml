services:
  redis:
    image: redis:7.4-alpine
    container_name: redis_server
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS__PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    env_file:
      - bot.env

  db:
    image: pgvector/pgvector:pg17
    container_name: database_server
    restart: always
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - orchestrator.env

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: bot_server
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DB__HOST: db
      REDIS__HOST: redis
    env_file:
      - bot.env
    volumes:
      - ${PATHS__LOGGING:-./config/logging.yml}:/bot/config/logging.yml:ro
      - ${PATHS__CONSTANTS:-./config/bot/constants.yml}:/bot/config/constants.yml:ro
      - ${PATHS__MESSAGES:-./config/bot/messages.yml}:/bot/config/messages.yml:ro
      - ${PATHS__COMMANDS:-./config/bot/commands.yml}:/bot/config/commands.yml:ro

volumes:
  postgres_data:
  redis_data:
