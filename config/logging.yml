cached_limit: 20
repeat_limit: 5

handlers:
  - sink: "ext://sys.stdout"
    level: "INFO"
    colorize: true
    format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> [<level>{level}</level>] <cyan>{name}</cyan>: {message} | Extra: {extra}"

  - sink: "log/app.jsonl"
    json: true 
    level: "INFO"
    rotation: "10 MB"
    retention: 5

activation:
  aiogram.event: WARNING
  aiogram.dispatcher: INFO
  uvicorn.error: INFO
  uvicorn.access: WARNING
  httpx: WARNING