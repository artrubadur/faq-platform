embedding:
  method: "POST"
  url: "https://llm.api.cloud.yandex.net/foundationModels/v1/textEmbedding"

  headers:
    Authorization: "Bearer {iam_token}"
    Content-Type: "application/json"

  body:
    modelUri: "emb://{folder_id}/text-search-query/latest"
    
  path:
    target: ["text"]
    source: ["embedding"]


rerank:
  method: "POST"
  url: "https://llm.api.cloud.yandex.net/foundationModels/v1/completion"

  headers:
    Authorization: "Bearer {iam_token}"
    Content-Type: "application/json"

  body:
    modelUri: "gpt://{folder_id}/yandexgpt-5-lite/latest"
    messages:
      - role: "system"
        text: |
          You are a re-ranking function.
          Given a user query and a list of candidate questions, return the candidate IDs sorted from most relevant to least relevant.
          Rules:
          - Rank by semantic relevance to the user query.
          - Compare intent, not just shared words.
          - Prefer exact intent matches over broad thematic similarity.
          - The provided score is only a hint and must not dominate your decision.
          - Do not omit or duplicate IDs.

      - role: "user"
        text: '{{"query": {query}, "candidates": {candidates}}}'

    json_schema:
      schema:
        type: "object"
        required: ["result"]
        properties:
          result:
            type: "array"
            items:
              type: "integer"

    completionOptions:
      stream: false
      temperature: 0
      maxTokens: 128

  path:
    target: ["messages", 1, "text"]
    source: ["result", "alternatives", 0, "message", "text"]


compose:
  method: "POST"
  url: "https://llm.api.cloud.yandex.net/foundationModels/v1/completion"

  headers:
    Authorization: "Bearer {iam_token}"
    Content-Type: "application/json"

  body:
    modelUri: "gpt://{folder_id}/yandexgpt-5-lite/latest"
    messages:
      - role: "system"
        text: |
          Generate one final FAQ answer using only the provided content.

          Rules:
          - `best_candidate` is the primary source.
          - Use `supporting_candidates` only if they match the same intent and improve clarity.
          - Ignore conflicting or irrelevant supporting candidates.
          - Do not add new facts or outside knowledge.
          - Return one direct answer only.

          Rewriting:
          - Do not closely copy or quote the source unless required for accuracy.
          - Prefer natural paraphrasing and different wording.
          - Keep the meaning, conditions, and limits unchanged.
          - Merge supporting details only if they fit and improve the answer.

          Style:
          - Clear, concise, natural.
          - Simple HTML is allowed.

      - role: "user"
        text: '{{"query": {query}, "best_candidate": {best_candidate}, "supporting_candidates": {supporting_candidates}}}'

    json_schema:
      schema:
        type: "object"
        required: ["result"]
        properties:
          result:
            type: "string"

    completionOptions:
      stream: false
      temperature: 1
      maxTokens: 384

  path:
    target: ["messages", 1, "text"]
    source: ["result", "alternatives", 0, "message", "text"]


generation:
  method: "POST"
  url: "https://llm.api.cloud.yandex.net/foundationModels/v1/completion"

  headers:
    Authorization: "Bearer {iam_token}"
    Content-Type: "application/json"

  body:
    modelUri: "gpt://{folder_id}/yandexgpt-5-lite/latest"
    messages:
      - role: "system"
        text: |
          You rewrite FAQ questions into semantically equivalent alternatives.

          Goal:
          - Generate up to `amount` variants of `question_text`.
          - Improve embedding-space coverage while preserving the same meaning.

          Output contract:
          - Return exactly one valid compact JSON object: {"result": ["...", "..."]}.
          - `result` must be an array of strings.
          - Each item must be one standalone question on a single line.
          - Do not output any text outside this JSON object.

          Hard rules:
          - Preserve original intent, scope, entities, conditions, and constraints.
          - Keep the same language and writing script as `question_text`. Never translate.
          - Keep length close to the original: each variant should be no more than 1.5x longer than `question_text`.
          - Plain text only: no markdown/html/code fences/tables/list markers/wrappers.
          - No decorative or broken symbol sequences.
          - No merged multi-question items.
          - No duplicates or near-duplicates.

          Diversity rules:
          - Do not produce synonym-only rewrites.
          - Vary question openings and syntax.
          - Mix different framings when possible:
            source/location, action/process, navigation/path, information-need/coverage.

          Final check:
          - Remove invalid items.
          - If valid unique items are fewer than `amount`, return fewer.

      - role: "user"
        text: '{{"question_text": {question_text}, "amount": {amount}}}'

    json_schema:
      schema:
        type: "object"
        required: ["result"]
        properties:
          result:
            type: "array"
            items:
              type: "string"

    completionOptions:
      stream: false
      temperature: 0.8
      maxTokens: 512

  path:
    target: ["messages", 1, "text"]
    source: ["result", "alternatives", 0, "message", "text"]
